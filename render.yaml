services:
  - type: web
    name: djangoquest-backend
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn djangoquestbackend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: djangoquest-db
          property: connectionString

databases:
  - name: djangoquest-db
    plan: free
